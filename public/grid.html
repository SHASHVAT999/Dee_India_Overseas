<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #f0f0f0; display: flex; flex-wrap: wrap; }
        .container {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 20px;
            background: white;
            border: 2px solid red;
        }
        .container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: grid;
            grid-template-columns: repeat(10, 10%);
            grid-template-rows: repeat(10, 10%);
            pointer-events: none;
        }
        .grid div {
            border: 1px solid rgba(0, 0, 255, 0.3);
            box-sizing: border-box;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            font-size: 10px;
            color: blue;
            padding: 2px;
        }
        .title { position: absolute; top:0; left:0; background: black; color: white; padding: 5px; z-index: 100;}
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Tuk Tuk</div>
        <img src="images/hero_3d/tuktuk_3d.png" />
        <div class="grid" id="grid1"></div>
    </div>
    <div class="container">
        <div class="title">Scooter</div>
        <img src="images/hero_3d/scooter_3d.png" />
        <div class="grid" id="grid2"></div>
    </div>
    <div class="container">
        <div class="title">Truck</div>
        <img src="images/hero_3d/truck_3d.png" />
        <div class="grid" id="grid3"></div>
    </div>
    <div class="container">
        <div class="title">Motorcycle</div>
        <img src="images/hero_3d/motorcycle_3d.png" />
        <div class="grid" id="grid4"></div>
    </div>
    <script>
        document.querySelectorAll('.grid').forEach(grid => {
            for(let y=0; y<10; y++) {
                for(let x=0; x<10; x++) {
                    let cell = document.createElement('div');
                    // y is from top, we want y from bottom
                    let bottom = 100 - (y+1)*10;
                    let left = x*10;
                    cell.innerText = `${left},${bottom}`;
                    grid.appendChild(cell);
                }
            }
        });
    </script>
</body>
</html>
