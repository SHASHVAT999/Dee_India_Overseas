<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #ab2727; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; gap: 2rem; }
        .icon { width: 300px; height: 300px; color: white; border: 1px solid white; }
    </style>
</head>
<body>
    <!-- Flipped via transform -->
    <svg
        class="icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
    >
        <g transform="matrix(-1 0 0 1 24 0)">
            <!-- Front Wheel -->
            <circle cx="18.5" cy="15" r="3" />
            <!-- Rear Wheel -->
            <circle cx="4.5" cy="15" r="3" />

            <!-- Floorboard -->
            <path d="M8 14 h 5" />

            <!-- Front Fork -->
            <path d="M18.5 15 l -2.5 -8" />
            
            <!-- Front Shield -->
            <path d="M16 7 l -3 7" />

            <!-- Handlebar -->
            <path d="M16 7 l -2 -0.5 h -1.5" />

            <!-- Headlight / Console -->
            <path d="M16 7 l 0.5 -2 h 1.5 a 1 1 0 0 1 1 1 v 1 h -3" />

            <!-- Rear Cowl / Engine -->
            <path d="M8 14 L 8.5 7.5 h -5 l -2 4.5 l 3 3" />

            <!-- Seat -->
            <path d="M3.5 7.5 c 0 -2 5 -2 6 0 z" />
        </g>
    </svg>

    <!-- Flipped via math -->
    <svg
        class="icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
    >
        <!-- Wheels -->
        <circle cx="5.5" cy="15" r="3" />
        <circle cx="19.5" cy="15" r="3" />

        <!-- Floorboard -->
        <path d="M16 14 h -5" />

        <!-- Front Fork -->
        <path d="M5.5 15 l 2.5 -8" />
        
        <!-- Front Shield -->
        <path d="M8 7 l 3 7" />

        <!-- Handlebar -->
        <path d="M8 7 l 2 -0.5 h 1.5" />

        <!-- Headlight / Console -->
        <path d="M8 7 l -0.5 -2 h -1.5 a 1 1 0 0 0 -1 1 v 1 h 3" />

        <!-- Rear Cowl / Engine -->
        <path d="M16 14 L 15.5 7.5 h 5 l 2 4.5 l -3 3" />

        <!-- Seat -->
        <path d="M20.5 7.5 c 0 -2 -5 -2 -6 0 z" />
    </svg>
</body>
</html>
