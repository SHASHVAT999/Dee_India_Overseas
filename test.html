<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  svg { stroke: white; width: 400px; height: 400px; border: 1px dashed #555; }
</style>
</head>
<body>
  <div id="container"></div>
  <script>
    const paths = [
      '<circle cx="5.5" cy="16" r="3" />',
      '<circle cx="5.5" cy="16" r="0.5" fill="white" stroke="none" />',
      '<circle cx="18.5" cy="16" r="3" />',
      '<circle cx="18.5" cy="16" r="0.5" fill="white" stroke="none" />',
      
      '<path d="M 6 5 H 8" />',
      '<circle cx="9" cy="5" r="1" />',
      
      '<path d="M 7 5 C 4 9 4 14 7 14 H 12 Q 13 14 13 12 V 9 H 20 A 2 2 0 0 1 22 11 V 15" />',
      '<path d="M 12 9 C 12 6.5 21 6.5 21 9 Z" />',
      
      '<path d="M 3.5 15 Q 5.5 12 7.5 14" />',
      '<path d="M 13.5 15.5 H 19.5" />' 
    ];
    document.getElementById('container').innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        ${paths.join('\\n')}
      </svg>
    `;
  </script>
</body>
</html>
